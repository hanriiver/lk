spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:6543}/postgres?prepareThreshold=0}
    username: ${PGUSER:${SUPABASE_DB_USERNAME:postgres}}
    password: ${PGPASSWORD:${SUPABASE_DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SELECT 1"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage-bucket: menus

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 28800000   # 8 hours

admin:
  pin: ${ADMIN_PIN:1234}

server:
  port: 8080

logging:
  level:
    com.lemon: DEBUG
